<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b3e;--navy2:#12244f;--navy3:#1a3066;
  --gold:#f0b429;--gold2:#d4942a;
  --green:#22c55e;--red:#ef4444;--draw:#f59e0b;
  --text:#e8f0fe;--text-muted:#8b9dc3;
  --radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:"Poppins",sans-serif;background:var(--navy);min-height:100vh;color:var(--text);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(30,60,120,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(20,50,100,.3) 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,rgba(15,40,90,.3) 0%,transparent 50%);pointer-events:none;z-index:0}

.layout-wrapper { display: flex; max-width: 1400px; margin: 0 auto; align-items: flex-start; padding-top: 20px; }
.main-content { flex: 1; min-width: 0; padding: 0 16px; }
.sidebar { width: 340px; background: rgba(255,255,255,0.02); border-left: 1px solid rgba(255,255,255,0.08); padding: 24px; position: sticky; top: 84px; height: calc(100vh - 84px); overflow-y: auto; display: flex; flex-direction: column; gap: 24px; backdrop-filter: blur(10px); }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(240,180,41,.3); border-radius: 4px; }
.sidebar-title { font-family: "Bebas Neue", sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--gold); text-align: center; }
.stat-box { background: rgba(0,0,0,0.25); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); padding: 18px; }
.stat-box-title { font-size: .8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.stat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); font-size: .85rem; }
.stat-player { display: flex; align-items: center; gap: 8px; }
.stat-val { font-weight: 800; font-size: 1rem; color: var(--gold); background: rgba(240,180,41,.1); padding: 2px 10px; border-radius: 12px; min-width: 32px; text-align: center; }

#auth-overlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#0a1628 0%,#0d1b3e 50%,#0a1225 100%);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:28px}
.auth-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(2rem,8vw,4rem);letter-spacing:4px;color:var(--gold);text-align:center}
.auth-subtitle{color:var(--text-muted);font-size:.9rem;text-align:center;margin-top:-16px}
.auth-custom{display:flex;gap:8px;max-width:380px;width:90%}
.auth-input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-family:"Poppins",sans-serif;font-size:.9rem;outline:none;}
.auth-input:focus{border-color:var(--gold)}
.auth-go{padding:12px 20px;background:var(--gold);color:#0d1b3e;border:none;border-radius:12px;font-weight:700;font-family:"Poppins",sans-serif;cursor:pointer;}

#wc-header{position:sticky;top:0;z-index:100;background:rgba(13,27,62,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(240,180,41,.2);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:10px}
.header-title{font-family:"Bebas Neue",sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--gold);white-space:nowrap;cursor:pointer}
.header-tabs{display:flex;gap:5px;flex:1;justify-content:center;flex-wrap:wrap}
.tab-btn{background:transparent;border:1px solid rgba(240,180,41,.25);color:var(--text-muted);padding:6px 12px;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;font-family:"Poppins",sans-serif}
.tab-btn.active{background:var(--gold);border-color:var(--gold);color:#0d1b3e}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#user-pill{background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.3);border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:6px;cursor:pointer}
.upill-dot{width:8px;height:8px;border-radius:50%;}
.restart-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#fca5a5;padding:7px 12px;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;}

.page{display:none;position:relative;z-index:1;min-height:calc(100vh - 64px);padding:24px 16px 60px}
.page.active{display:block}

/* ── SIMULATOR MATCH CARD VIEW ── */
.gs-title{font-family:"Bebas Neue",sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--gold);text-align:center;margin-bottom:6px}
.gs-subtitle{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:28px}
.progress-wrap{max-width:620px;margin:0 auto 28px;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-muted);margin-bottom:6px}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px;transition:width .5s ease}

.match-card{max-width:620px;margin:0 auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.match-group-tag{text-align:center;font-size:.7rem;font-weight:700;letter-spacing:2px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase}
.match-teams{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px;padding:10px 0;}
.match-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.team-flag{font-size:3.2rem;line-height:1}
.team-name{font-weight:700;font-size:1.1rem;text-align:center}
.match-vs{font-family:"Bebas Neue",sans-serif;font-size:2rem;color:var(--text-muted);flex-shrink:0}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:14px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--text);font-family:"Poppins",sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:.2s;text-align:center}
.choice-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.choice-btn.win1:hover,.choice-btn.win1.selected{background:rgba(34,197,94,.2);border-color:var(--green);color:#86efac}
.choice-btn.draw:hover,.choice-btn.draw.selected{background:rgba(245,158,11,.2);border-color:var(--draw);color:#fcd34d}
.choice-btn.win2:hover,.choice-btn.win2.selected{background:rgba(239,68,68,.2);border-color:var(--red);color:#fca5a5}

.sim-box{margin-top:20px;background:rgba(0,0,0,.3);border-radius:14px;border:1px solid rgba(255,255,255,.08);overflow:hidden;display:none}
.sim-scoreboard{background:linear-gradient(135deg,rgba(13,27,62,.9),rgba(18,36,79,.9));padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
.sim-score{font-family:"Bebas Neue",sans-serif;font-size:3.5rem;color:#fff;letter-spacing:4px;line-height:1}
.sim-teams-row{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text-muted);margin-top:4px}
.sim-events{padding:12px 16px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sim-event{font-size:.78rem;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.04);display:flex;align-items:center;gap:8px;animation:slideInEv .25s ease}
@keyframes slideInEv{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.sim-event .ev-min{color:var(--gold);font-weight:700;min-width:36px}

.pen-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.05); }
.pen-dots { display: flex; gap: 6px; flex-wrap: wrap; width: 40%; justify-content: center;}
.pen-dots.left { justify-content: flex-end; }
.pen-dots.right { justify-content: flex-start; }
.pen-dot { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px;}
.pen-dot.goal { background: var(--green); border-radius: 50%; box-shadow: 0 0 8px rgba(34,197,94,.4); }
.pen-dot.miss { color: var(--red); text-shadow: 0 0 6px rgba(239,68,68,.5); font-family: sans-serif; line-height: 1;}
.pen-dot.miss::before { content: "✖"; }
.pen-score-mid { font-family: "Bebas Neue", sans-serif; font-size: 2rem; color: var(--text); white-space: nowrap; }

.next-match-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0d1b3e;border:none;border-radius:14px;font-family:"Poppins",sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;display:none}

/* ── RESULTS ── */
.results-page{max-width:960px;margin:0 auto}
.result-wrap{max-width:440px;margin:0 auto 40px}
.result-card{background:linear-gradient(160deg,#0d1b3e 0%,#12244f 50%,#0a1630 100%);border:1px solid rgba(240,180,41,.25);border-radius:28px;padding:32px 24px;box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;text-align:center;}
.result-title{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:3px;color:var(--gold);margin-bottom:6px}
.result-user{font-size:.78rem;color:var(--text-muted);margin-bottom:24px;}
.done-message{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:20px;font-weight:600;}

#wc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center}
.wc-toast-item{background:rgba(13,27,62,.95);color:#fff;padding:10px 22px;border-radius:22px;font-size:.82rem;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);}

@media(max-width:850px){
  .layout-wrapper { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); padding: 24px 16px; }

function flag(t){return TEAMS[t]?.flag||"🏳️"}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getRank(t) { return TEAM_RANKS[t] || 25; }

function genKOScore(t1, t2, outcome) {
  const r1 = getRank(t1), r2 = getRank(t2);
  let diff = r2 - r1;
  if (outcome === "draw") { let g = rng(0, 2); return [g, g]; }
  
  const t1Wins = outcome === "win1";
  const rankDiff = t1Wins ? diff : -diff;
  let wG = 1, lG = 0, rand = Math.random();

  if (rankDiff > 15) { wG = rand < 0.4 ? 2 : (rand < 0.8 ? 3 : 4); lG = rand < 0.3 ? 1 : 0; }
  else if (rankDiff > 5) { wG = rand < 0.6 ? 2 : 1; lG = rand < 0.4 ? 1 : 0; }
  else { wG = rand < 0.7 ? 2 : 1; lG = rand < 0.5 ? 1 : 0; }
  
  if (wG === lG) wG++;
  return t1Wins ? [wG, lG] : [lG, wG];
}

function genEvents(t1, t2, s1, s2, maxMins=120) {
  const ev=[];
  const p1=TEAMS[t1]?.players || ["Player 1"];
  const p2=TEAMS[t2]?.players || ["Player 1"];
  
  const gMins1 = Array.from({length: s1}, () => rng(1, maxMins)).sort((a,b)=>a-b);
  const gMins2 = Array.from({length: s2}, () => rng(1, maxMins)).sort((a,b)=>a-b);

  gMins1.forEach(m => {
    const sc = pick(p1);
    const as = Math.random() > 0.4 ? pick(p1.filter(x=>x!==sc)) : null;
    ev.push({m, team:1, teamName:t1, sc, as, type:"goal"});
  });
  gMins2.forEach(m => {
    const sc = pick(p2);
    const as = Math.random() > 0.4 ? pick(p2.filter(x=>x!==sc)) : null;
    ev.push({m, team:2, teamName:t2, sc, as, type:"goal"});
  });

  let ycs = {}; let reds = new Set();
  const ycCount = rng(1, 3); 

  for(let i=0; i<ycCount; i++){
    const m = rng(5, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const pool = t===1 ? p1 : p2;
    
    const validPool = pool.filter(p => !ev.some(e=>e.type==="goal" && e.sc===p && e.m>=m) && !reds.has(p));
    if(validPool.length === 0) continue;
    
    const pl = pick(validPool);
    if(ycs[pl]) {
      ev.push({m, team:t, pl, type:"red", reason:"2nd Yellow"});
      reds.add(pl);
    } else {
      ycs[pl] = true;
      ev.push({m, team:t, pl, type:"yellow"});
    }
  }

  if(Math.random() < 0.02) {
    const m = rng(10, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const validPool = (t===1?p1:p2).filter(p => !ev.some(e=>e.type==="goal" && e.sc===p && e.m>=m) && !reds.has(p));
    if(validPool.length > 0) {
      const pl = pick(validPool);
      ev.push({m, team:t, pl, type:"red", reason:"Straight Red"});
      reds.add(pl);
    }
  }
  return ev.sort((a,b)=>a.m-b.m);
}

function simulatePenalties() {
  let p1=0, p2=0; let h1=[], h2=[];
  for(let i=0; i<5; i++){
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  while(p1 === p2) {
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  return {p1, p2, h1, h2};
}

function renderMatchCard(idx) {
  if(idx >= SON32_MATCHES.length) {

  const m = SON32_MATCHES[idx];
  document.getElementById("match-title-tag").textContent = `MAÇ ${idx+1} / ${SON32_MATCHES.length}`;
  document.getElementById("team1-flag").textContent = flag(m.t1);
  document.getElementById("team2-flag").textContent = flag(m.t2);
  document.getElementById("team1-name").textContent = m.t1;
  document.getElementById("team2-name").textContent = m.t2;
  
  document.getElementById("choice-win1").textContent = `🟢 ${m.t1} Kazanır`;
  document.getElementById("choice-win2").textContent = `🔴 ${m.t2} Kazanır`;

  const now = new Date().getTime();
  const matchTime = new Date(m.date).getTime();
  isCurrentMatchLocked = now >= matchTime;

  if (isCurrentMatchLocked) {
    document.querySelectorAll(".choice-btn").forEach(b => b.style.display = "none");
    const sb = document.getElementById("sim-box");
    sb.style.display = "block";
    
    document.getElementById("sim-t1").textContent = m.t1;
    document.getElementById("sim-t2").textContent = m.t2;
    document.getElementById("sim-events").innerHTML = `
      <div style="text-align:center; padding:16px; color:var(--red); font-weight:700;">
        MAÇ BAŞLADI/TAMAMLANDI<br><span style="font-size:0.8rem; color:var(--text-muted);">Tahmine Kapalı</span>
      </div>`;
    
    if (m.realScore) {
        document.getElementById("sim-score").textContent = `${m.realScore.s1} - ${m.realScore.s2}`;
    } else {
        document.getElementById("sim-score").textContent = `-`;
    }

    document.getElementById("next-match-btn").style.display = "block";
  } else {
    document.getElementById("sim-box").style.display = "none";
    document.getElementById("next-match-btn").style.display = "none";
    document.querySelectorAll(".choice-btn").forEach(b => { 
        b.style.display = "block"; 
        b.classList.remove("selected"); 
        b.disabled = false; 
        b.style.opacity = "1"; 
    });
  }
  
  const pct = ((idx) / SON32_MATCHES.length * 100).toFixed(1);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("match-progress-txt").textContent = `Maç ${idx+1} / ${SON32_MATCHES.length}`;
}

async function handleChoice(outcome) {
  if (isCurrentMatchLocked) return;

  const m = SON32_MATCHES[currentMatchIdx];
  
  const now = new Date().getTime();
  const matchTime = new Date(m.date).getTime();
  if (now >= matchTime) {
      toast("Bu maç çoktan başladı! Tahmin yapamazsınız.");
      renderMatchCard(currentMatchIdx);
      return;
  }

  document.querySelectorAll(".choice-btn").forEach(b => { b.disabled = true; b.style.opacity = ".4"; });
  
  const selClass = outcome === "win1" ? "win1" : (outcome === "draw" ? "draw" : "win2");
  document.querySelector(`.choice-btn.${selClass}`)?.classList.add("selected");
  
  const [s1, s2] = genKOScore(m.t1, m.t2, outcome);
  const evs = genEvents(m.t1, m.t2, s1, s2, 120);
  
  let pens = null;
  let winner = s1 > s2 ? m.t1 : (s2 > s1 ? m.t2 : null);
  if(outcome === "draw" || s1 === s2) {
    pens = simulatePenalties();
    winner = pens.p1 > pens.p2 ? m.t1 : m.t2;
  }
  
  const sb = document.getElementById("sim-box");
  const ec = document.getElementById("sim-events");
  const sc = document.getElementById("sim-score");
  sb.style.display = "block"; ec.innerHTML = "";
  document.getElementById("sim-t1").textContent = m.t1;
  document.getElementById("sim-t2").textContent = m.t2;
  
  let c1=0, c2=0; sc.textContent = "0 - 0";
  const delay = 150;
  
  for(const ev of evs){
    await new Promise(r => setTimeout(r, delay));
    const div = document.createElement("div"); div.className = "sim-event";
    if(ev.type === "goal"){
      if(ev.team === 1) c1++; else c2++; sc.textContent = `${c1} - ${c2}`;
      div.innerHTML = `<span class="ev-min">${ev.m}'</span><span>⚽</span><span>${flag(ev.teamName)} <strong>${ev.sc}</strong></span>`;
    } else {
      div.innerHTML = `<span class="ev-min">${ev.m}'</span><span>${ev.type==="red"?"🟥":"🟨"}</span><span>${flag(ev.teamName)} ${ev.pl}</span>`;
    }
    ec.appendChild(div); ec.scrollTop = ec.scrollHeight;
  }
  sc.textContent = `${s1} - ${s2}`;
  
  if(pens) {
    const pr = document.createElement("div"); pr.className = "pen-row";
    pr.innerHTML = `<div class="pen-dots left">${pens.h1.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div><div class="pen-score-mid">${pens.p1} - ${pens.p2}</div><div class="pen-dots right">${pens.h2.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div>`;
    ec.appendChild(pr);
  }
  
  simulationResults[m.id] = { s1, s2, winner, pens, isUserPrediction: true };
  
  evs.forEach(e => {
    if(e.type === "goal") {
      if(!playerStats[e.sc]) playerStats[e.sc] = { goals: 0, assists: 0, teamName: e.teamName };
      playerStats[e.sc].goals++;
      if(e.as) {
        if(!playerStats[e.as]) playerStats[e.as] = { goals: 0, assists: 0, teamName: e.teamName };
        playerStats[e.as].assists++;
      }
    }
  });
  
  renderStats();
  document.getElementById("next-match-btn").style.display = "block";
  
  set(ref(db, `${FBP()}/simulationResults`), simulationResults);
  set(ref(db, `${FBP()}/playerStats`), playerStats);
  set(ref(db, `${FBP()}/progress`), currentMatchIdx + 1);
}

document.getElementById("choice-win1").addEventListener("click", ()=>handleChoice("win1"));

document.getElementById("choice-win2").addEventListener("click", ()=>handleChoice("win2"));

document.getElementById("next-match-btn").addEventListener("click", ()=>{
  if (isCurrentMatchLocked) {
      const m = SON32_MATCHES[currentMatchIdx];
      simulationResults[m.id] = { 
          skipped: true, 
          isUserPrediction: false,
          realScore: m.realScore || null 
      };
      set(ref(db, `${FBP()}/simulationResults`), simulationResults);
      set(ref(db, `${FBP()}/progress`), currentMatchIdx + 1);
  }

  currentMatchIdx++;
  if(currentMatchIdx >= SON32_MATCHES.length) {
    set(ref(db, `${FBP()}/done`), true);
    switchTab("results");
  } else {
    renderMatchCard(currentMatchIdx);
  }
});

function renderStats() {
  const arr = Object.keys(playerStats).map(p => ({name: p, ...playerStats[p]}));
  
  const topScorers = [...arr].sort((a,b) => b.goals - a.goals || b.assists - a.assists).slice(0, 10);
  const topAssists = [...arr].sort((a,b) => b.assists - a.assists || b.goals - a.goals).slice(0, 10);
  
  document.getElementById("top-scorers-list").innerHTML = topScorers.map(p => `<div class="stat-item"><div class="stat-player"><span>${flag(p.teamName)}</span> <span>${p.name}</span></div><div class="stat-val">${p.goals}</div></div>`).join("");
  document.getElementById("top-assists-list").innerHTML = topAssists.map(p => `<div class="stat-item"><div class="stat-player"><span>${flag(p.teamName)}</span> <span>${p.name}</span></div><div class="stat-val">${p.assists}</div></div>`).join("");
}

function renderResults() {
  const mw = document.getElementById("my-result-wrap");
  mw.innerHTML = `
    <div class="result-card">
      <div class="result-title">SON 32 SİMÜLASYON ÖZETİ</div>
      <div class="result-user">${curUser} tarafından tamamlanan tahminler</div>
      <div class="done-message">
        ${currentMatchIdx >= SON32_MATCHES.length ? "🎉 Tebrikler! Tüm 16 eleme maçının aşamasını tamamladın." : "Turnuva henüz tamamlanmadı. Maçları sırayla incelemeye devam edin!"}
      </div>
    </div>`;
}

document.getElementById("restart-btn").addEventListener("click", async()=>{
  if(!confirm("Simülasyonu sıfırlamak istediğine emin misin?")) return;
  await remove(ref(db, FBP()));
  location.reload();
});

async function loadAndInit() {
  try {
    const snap = await get(ref(db, FBP()));
    const data = snap.val();
    if(data) {
      simulationResults = data.simulationResults || {};
      playerStats = data.playerStats || JSON.parse(JSON.stringify(INITIAL_TOURNAMENT_STATS));
      currentMatchIdx = data.progress || 0;
    } else {
      playerStats = JSON.parse(JSON.stringify(INITIAL_TOURNAMENT_STATS));
      currentMatchIdx = 0;
    }
    renderStats();
    renderMatchCard(currentMatchIdx);
  } catch(e) {
    console.error(e);
  }
}
