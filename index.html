.wc-toast-item{background:rgba(13,27,62,.95);color:#fff;padding:10px 22px;border-radius:22px;font-size:.82rem;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);animation:toastIn .3s ease;}

// ── FIXED EVENT GENERATOR ──
// Futbol mantık hataları (kırmızı yiyen oyuncunun sonradan gol atması vs.) düzeltildi
function genEvents(t1,t2,s1,s2, maxMins=120){
  const ev=[]; 
  const p1=TEAMS[t1]?.players||["Oyuncu 1","Oyuncu 2"];
  const p2=TEAMS[t2]?.players||["Oyuncu 1","Oyuncu 2"];
  
  // 1. Önce golleri (ve dakikalarını) belirle
  const gMins1 = Array.from({length: s1}, () => rng(1, maxMins)).sort((a,b)=>a-b);
  const gMins2 = Array.from({length: s2}, () => rng(1, maxMins)).sort((a,b)=>a-b);

  gMins1.forEach(m => {
      let sc = wPick(p1);
      ev.push({m, team:1, teamName:t1, sc, type:"goal"});
  });
  gMins2.forEach(m => {
      let sc = wPick(p2);
      ev.push({m, team:2, teamName:t2, sc, type:"goal"});
  });

  // 2. Kartları atarken gol zaman çizelgesini kontrol et
  let ycs = {}; 
  let reds = new Set();
  
  // Kart sayısı ciddi oranda düşürüldü (Maç başı ortalama 1-3 sarı kart)
  const ycCount = rng(1, 3); 
  
  for(let i=0; i<ycCount; i++){
    const m = rng(10, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const pool = t===1 ? p1 : p2;
    
    // Geçerli havuz: Bu dakikadan SONRA gol atmamış ve ÖNCESİNDE kırmızı kart görmemiş oyuncular
    const validPool = pool.filter(p => {
        const scoresLater = ev.some(e => e.type === "goal" && e.sc === p && e.m >= m);
        const alreadyRed = Array.from(reds).includes(p);
        const gotRedEarlier = ev.some(e => e.type === "red" && e.pl === p && e.m <= m);
        return !scoresLater && !alreadyRed && !gotRedEarlier;
    });
    
    if(validPool.length === 0) continue;
    
    const pl = wPick(validPool);
    
    if(ycs[pl]) {
      // 2. Sarı kart kesinlikle Kırmızıya dönüşür
      ev.push({m, team:t, pl, type:"red", reason:"2nd Yellow"});
      reds.add(pl);
    } else {
      ycs[pl] = true;
      ev.push({m, team:t, pl, type:"yellow"});
    }
  }

  // Direkt kırmızı kart ihtimali radikal şekilde düşürüldü (%2)
  if(Math.random() < 0.02) {
    const m = rng(15, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const validPool = (t===1?p1:p2).filter(p => {
        const scoresLater = ev.some(e => e.type === "goal" && e.sc === p && e.m >= m);
        const alreadyRed = Array.from(reds).includes(p);
        return !scoresLater && !alreadyRed;
    });
    
    if(validPool.length > 0) {
      const pl = wPick(validPool);
      ev.push({m, team:t, pl, type:"red", reason:"Straight Red"});
      reds.add(pl);
    }
  }

  return ev.sort((a,b)=>a.m-b.m);
}

function simulatePenalties() {
  let p1=0, p2=0; let h1=[], h2=[];
  for(let i=0; i<5; i++){
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  while(p1 === p2) {
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  return {p1, p2, h1, h2};
}

function getRank(t) { return TEAM_RANKS[t] || 24; }
function genKOScore(t1, t2, outcome) {
  const r1 = getRank(t1), r2 = getRank(t2);
  let diff = r2 - r1; 
  if (outcome === "draw") { let g = rng(0, 1); return [g, g]; }
  
  const t1Wins = outcome === "win1";
  const rankDiff = t1Wins ? diff : -diff; 
  let wG = 1, lG = 0, rand = Math.random();

  if (rankDiff > 15) { wG = rand < 0.5 ? 2 : 3; lG = rand < 0.3 ? 1 : 0; } 
  else if (rankDiff > 5) { wG = rand < 0.6 ? 2 : 1; lG = rand < 0.4 ? 1 : 0; } 
  else { wG = rand < 0.7 ? 2 : 1; lG = rand < 0.5 ? 1 : 0; }
  
  if (wG === lG) wG++;
  return t1Wins ? [wG, lG] : [lG, wG];
}

// ── YENİ HARDCODED SON 32 EŞLEŞMELERİ (Gönderilen görsele göre dizayn edildi) ──
const INITIAL_BRACKET = [
  {id:"m1", t1:"South Africa", t2:"Canada"},
  {id:"m2", t1:"Germany", t2:"Paraguay"},
  {id:"m3", t1:"Ivory Coast", t2:"Norway"},
  {id:"m4", t1:"Mexico", t2:"Ecuador"},
  {id:"m5", t1:"Belgium", t2:"Senegal"},
  {id:"m6", t1:"Spain", t2:"Austria"},
  {id:"m7", t1:"Switzerland", t2:"Algeria"},
  {id:"m8", t1:"Argentina", t2:"Cape Verde"},
  {id:"m9", t1:"Brazil", t2:"Japan"},
  {id:"m10", t1:"Netherlands", t2:"Morocco"},
  {id:"m11", t1:"France", t2:"Sweden"},
  {id:"m12", t1:"England", t2:"DR Congo"},
  {id:"m13", t1:"USA", t2:"Bosnia & Herzegovina"},
  {id:"m14", t1:"Portugal", t2:"Croatia"},
  {id:"m15", t1:"Australia", t2:"Egypt"},
  {id:"m16", t1:"Colombia", t2:"Ghana"}
];

const KO_FLOW = {
  r16: [{id:"m17", s1:"m1", s2:"m2"}, {id:"m18", s1:"m3", s2:"m4"}, {id:"m19", s1:"m5", s2:"m6"}, {id:"m20", s1:"m7", s2:"m8"},
        {id:"m21", s1:"m9", s2:"m10"}, {id:"m22", s1:"m11", s2:"m12"}, {id:"m23", s1:"m13", s2:"m14"}, {id:"m24", s1:"m15", s2:"m16"}],
  qf:  [{id:"m25", s1:"m17", s2:"m18"}, {id:"m26", s1:"m19", s2:"m20"}, {id:"m27", s1:"m21", s2:"m22"}, {id:"m28", s1:"m23", s2:"m24"}],
  sf:  [{id:"m29", s1:"m25", s2:"m26"}, {id:"m30", s1:"m27", s2:"m28"}]
};

let curUser=null;
let playerStats={};
let koState={ r32:INITIAL_BRACKET, r16:[], qf:[], sf:[], third:[], final:[], r32results:{}, r16results:{}, qfresults:{}, sfresults:{}, thirdresults:{}, finalresults:{} };
let currentKORound="r32";

const authEl=document.getElementById("auth-overlay");
function login(name){
  curUser=name;localStorage.setItem("wcKOUser",name);
  authEl.style.display="none";
  document.getElementById("user-dot").style.background=autoColor(name);
  document.getElementById("user-name-pill").textContent=name;
  loadAndInit();
}
document.getElementById("custom-name-btn").addEventListener("click",()=>{
  const v=document.getElementById("custom-name-inp").value.trim();
  if(v.length>=1) login(v);
});
if(localStorage.getItem("wcKOUser")) login(localStorage.getItem("wcKOUser"));

document.getElementById("user-pill").addEventListener("click",()=>{
  curUser=null;localStorage.removeItem("wcKOUser");authEl.style.display="flex";
});

function toast(msg){
  const w=document.getElementById("wc-toast");
  const d=document.createElement("div");d.className="wc-toast-item";d.textContent=msg;w.appendChild(d);
  setTimeout(()=>{d.style.opacity="0";setTimeout(()=>d.remove(),300)},2500);
}

function switchTab(name){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="page-"+name));
  if(name==="knockout") renderKOPage();
  if(name==="results") renderResults();
}
document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));

function updateStats(evs) {
  evs.forEach(e => {
    if(e.type === "goal") {
      if(!playerStats[e.sc]) playerStats[e.sc] = { goals: 0, assists: 0, teamName: e.teamName };
      playerStats[e.sc].goals++;
    }
  });
  renderStats();
}

function renderStats() {
  const arr = Object.keys(playerStats).map(p => ({name: p, ...playerStats[p]}));
  const ts = arr.filter(p => p.goals > 0).sort((a,b) => b.goals - a.goals).slice(0, 5);
  document.getElementById("top-scorers-list").innerHTML = ts.length ? ts.map(p => `<div class="stat-item"><div class="stat-player"><span style="font-size:1.2rem">${flag(p.teamName)}</span> <span>${p.name}</span></div><div class="stat-val">${p.goals}</div></div>`).join("") : `<div style="opacity:.5;font-size:.8rem;text-align:center;padding:10px">Henüz gol yok</div>`;
}

function renderKOPage(){
  const matches=koState[currentKORound]||[];
  const results=koState[`${currentKORound}results`]||{};
  const rounds = {r32:"SON 32", r16:"SON 16", qf:"ÇEYREK FİNAL", sf:"YARI FİNAL", third:"3.LÜK MAÇI", final:"FİNAL"};
  document.getElementById("ko-round-title").textContent=rounds[currentKORound]||currentKORound;
  const grid=document.getElementById("ko-matches-grid");grid.innerHTML="";

  matches.forEach(m=>{
    const res=results[m.id];
    const card=document.createElement("div");card.className=`ko-match-card${res?" done":""}`;
    card.innerHTML=`
      <div class="ko-match-teams">
        <div class="ko-team"><span class="ko-flag">${flag(m.t1)}</span><span class="ko-name">${m.t1}</span></div>
        <div class="ko-vs-sep${res?" result":""}">${res?`${res.s1}-${res.s2}`:"VS"}</div>
        <div class="ko-team right"><span class="ko-name">${m.t2}</span><span class="ko-flag">${flag(m.t2)}</span></div>
      </div>`;
    
    if(!res){
      const ch=document.createElement("div");ch.className="ko-choices";
      [["win1",`🟢 ${m.t1}`],["draw","🟡 Penaltılar"],["win2",`🔴 ${m.t2}`]].forEach(([out,lbl])=>{
        const btn=document.createElement("button");btn.className=`ko-choice-btn ${out}`;btn.textContent=lbl;
        btn.addEventListener("click",()=>handleKOChoice(m,out,card,btn));ch.appendChild(btn);
      });
      card.appendChild(ch);
    } else {
      const wd=document.createElement("div");wd.className="ko-winner-tag";wd.textContent=`🏅 ${flag(res.winner)} ${res.winner} geçti ${res.pens?`(Pen: ${res.pens.p1}-${res.pens.p2})`:""}`;
      card.appendChild(wd);
    }
    grid.appendChild(card);
  });

  const allDone=matches.length>0&&matches.every(m=>results[m.id]);
  const nb=document.getElementById("ko-next-btn");
  if(allDone){
    nb.style.display="block";
    nb.textContent=currentKORound==="final"?"Sonuçları Gör 🏆":"Sonraki Tur ▶";
  } else {nb.style.display="none";}
}

async function handleKOChoice(m,outcome,card,btn){
  card.querySelectorAll(".ko-choice-btn").forEach(b=>{b.disabled=true;b.style.opacity=".5"});
  btn.classList.add("selected");
  
  const [s1,s2]=genKOScore(m.t1,m.t2,outcome);
  const evs=genEvents(m.t1,m.t2,s1,s2, 120);
  let pens = null;
  let winner = s1 > s2 ? m.t1 : (s2 > s1 ? m.t2 : null);

  if(outcome === "draw" || s1 === s2) {
    pens = simulatePenalties();
    winner = pens.p1 > pens.p2 ? m.t1 : m.t2;
  }

  const sd=document.createElement("div");sd.className="sim-box";sd.style.cssText="display:block;margin-top:12px";
  sd.innerHTML=`<div class="sim-scoreboard"><div class="sim-score" id="ks-${m.id}">0 - 0</div><div class="sim-teams-row"><span>${m.t1}</span><span style="font-size:.6rem;letter-spacing:2px;color:var(--gold)">MAÇ SONU</span><span>${m.t2}</span></div></div><div class="sim-events" id="ke-${m.id}"></div>`;
  card.appendChild(sd);
  
  const se=document.getElementById(`ks-${m.id}`),ec2=document.getElementById(`ke-${m.id}`);
  const delay=150; let c1=0,c2=0;
  
  for(const ev of evs){
    await new Promise(r=>setTimeout(r,delay));
    if(ev.type==="goal"){
      if(ev.team===1)c1++;else c2++;se.textContent=`${c1} - ${c2}`;
      const d2=document.createElement("div");d2.className="sim-event";
      d2.innerHTML=`<span class="ev-min">${ev.m}'</span><span>⚽</span><span>${flag(ev.team===1?m.t1:m.t2)} <strong>${ev.sc}</strong></span>`;
      ec2.appendChild(d2);ec2.scrollTop=ec2.scrollHeight;
    } else {
      const d2=document.createElement("div");d2.className="sim-event";
      d2.innerHTML=`<span class="ev-min">${ev.m}'</span><span>${ev.type==="red"?"🟥":"🟨"}</span><span style="color:${ev.type==="red"?"var(--red)":"var(--text-muted)"}">${flag(ev.team===1?m.t1:m.t2)} ${ev.pl}</span>`;
      ec2.appendChild(d2);ec2.scrollTop=ec2.scrollHeight;
    }
  }
  se.textContent=`${s1} - ${s2}`;

  if(pens) {
    const pr = document.createElement("div"); pr.className = "pen-row";
    pr.innerHTML = `<div class="pen-dots left">${pens.h1.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div> <div class="pen-score-mid">${pens.p1} - ${pens.p2}</div> <div class="pen-dots right">${pens.h2.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div>`;
    ec2.appendChild(pr);
  }

  koState[`${currentKORound}results`][m.id]={s1,s2,winner,pens};
  card.classList.add("done");
  const wd=document.createElement("div");wd.className="ko-winner-tag";wd.textContent=`🏅 ${flag(winner)} ${winner} geçti ${pens?`(Pen: ${pens.p1}-${pens.p2})`:""}`;
  card.appendChild(wd);
  
  updateStats(evs);
  set(ref(db,`${FBP()}/koState`), koState);
  set(ref(db,`${FBP()}/playerStats`), playerStats);

  const allDone=koState[currentKORound].every(mx=>koState[`${currentKORound}results`]?.[mx.id]);
  if(allDone) document.getElementById("ko-next-btn").style.display="block";
}

document.getElementById("ko-next-btn").addEventListener("click",()=>{
  if(currentKORound==="final"){ switchTab("results"); return; }
  
  const nextMap = {r32:"r16", r16:"qf", qf:"sf", sf:"third", third:"final"};
  const next = nextMap[currentKORound];

  if(currentKORound==="sf"){
    const w1 = koState.sfresults["m29"].winner; const w2 = koState.sfresults["m30"].winner;
    const l1 = w1 === koState.sf[0].t1 ? koState.sf[0].t2 : koState.sf[0].t1;
    const l2 = w2 === koState.sf[1].t1 ? koState.sf[1].t2 : koState.sf[1].t1;
    koState.third = [{id: "m31", t1: l1, t2: l2}];
    koState.final = [{id: "m32", t1: w1, t2: w2}];
  } else if(currentKORound !== "third") {
    koState[next] = KO_FLOW[next].map(m => {
      return {id: m.id, t1: koState[`${currentKORound}results`][m.s1].winner, t2: koState[`${currentKORound}results`][m.s2].winner};
    });
  }

  currentKORound=next;
  renderKOPage();
  set(ref(db,`${FBP()}/koState`), koState);
  set(ref(db,`${FBP()}/currentKORound`), currentKORound);
});

function renderResults(){
  const finalRes = koState.finalresults["m32"];
  const champion = finalRes?.winner || "?";
  document.getElementById("my-result-wrap").innerHTML = `
    <div class="result-card">
      <div class="result-title">TURNUVA SONUCU</div>
      <div class="result-user">${curUser} tarafından</div>
      ${champion!=="?"?`
      <div class="champion-card"><div class="champion-emoji">🏆</div><div style="font-size:2rem">${flag(champion)}</div><div class="champion-info"><div class="champion-name">${champion}</div><div class="champion-label">ŞAMPİYON</div></div></div>
      `:"<div style='text-align:center;opacity:.5;padding:20px'>Turnuva tamamlanmadı...</div>"}
    </div>`;
}

document.getElementById("restart-btn").addEventListener("click",async()=>{
  if(!confirm("Simülasyonu sıfırlamak istediğine emin misin?")) return;
  await remove(ref(db,FBP()));
  location.reload();
});

async function loadAndInit(){
  try{
    const snap=await get(ref(db,FBP()));
    const data=snap.val();
    if(data && data.koState){
      koState = data.koState;
      currentKORound = data.currentKORound || "r32";
      playerStats = data.playerStats || {};
      renderStats();
    }
    renderKOPage();
  }catch(e){console.error(e);}
}
