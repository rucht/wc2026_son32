function flag(t){return TEAMS[t]?.flag||"🏳️"}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getRank(t) { return TEAM_RANKS[t] || 25; }

function genKOScore(t1, t2, outcome) {
  const r1 = getRank(t1), r2 = getRank(t2);
  let diff = r2 - r1;
  if (outcome === "draw") { let g = rng(0, 2); return [g, g]; }
  
  const t1Wins = outcome === "win1";
  const rankDiff = t1Wins ? diff : -diff;
  let wG = 1, lG = 0, rand = Math.random();

  if (rankDiff > 15) { wG = rand < 0.4 ? 2 : (rand < 0.8 ? 3 : 4); lG = rand < 0.3 ? 1 : 0; }
  else if (rankDiff > 5) { wG = rand < 0.6 ? 2 : 1; lG = rand < 0.4 ? 1 : 0; }
  else { wG = rand < 0.7 ? 2 : 1; lG = rand < 0.5 ? 1 : 0; }
  
  if (wG === lG) wG++;
  return t1Wins ? [wG, lG] : [lG, wG];
}

function genEvents(t1, t2, s1, s2, maxMins=120) {
  const ev=[];
  const p1=TEAMS[t1]?.players || ["Player 1"];
  const p2=TEAMS[t2]?.players || ["Player 1"];
  
  const gMins1 = Array.from({length: s1}, () => rng(1, maxMins)).sort((a,b)=>a-b);
  const gMins2 = Array.from({length: s2}, () => rng(1, maxMins)).sort((a,b)=>a-b);

  gMins1.forEach(m => {
    const sc = pick(p1);
    const as = Math.random() > 0.4 ? pick(p1.filter(x=>x!==sc)) : null;
    ev.push({m, team:1, teamName:t1, sc, as, type:"goal"});
  });
  gMins2.forEach(m => {
    const sc = pick(p2);
    const as = Math.random() > 0.4 ? pick(p2.filter(x=>x!==sc)) : null;
    ev.push({m, team:2, teamName:t2, sc, as, type:"goal"});
  });

  let ycs = {}; let reds = new Set();
  const ycCount = rng(1, 3); 

  for(let i=0; i<ycCount; i++){
    const m = rng(5, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const pool = t===1 ? p1 : p2;
    
    const validPool = pool.filter(p => !ev.some(e=>e.type==="goal" && e.sc===p && e.m>=m) && !reds.has(p));
    if(validPool.length === 0) continue;
    
    const pl = pick(validPool);
    if(ycs[pl]) {
      ev.push({m, team:t, pl, type:"red", reason:"2nd Yellow"});
      reds.add(pl);
    } else {
      ycs[pl] = true;
      ev.push({m, team:t, pl, type:"yellow"});
    }
  }

  if(Math.random() < 0.02) {
    const m = rng(10, maxMins-1);
    const t = Math.random() > 0.5 ? 1 : 2;
    const validPool = (t===1?p1:p2).filter(p => !ev.some(e=>e.type==="goal" && e.sc===p && e.m>=m) && !reds.has(p));
    if(validPool.length > 0) {
      const pl = pick(validPool);
      ev.push({m, team:t, pl, type:"red", reason:"Straight Red"});
      reds.add(pl);
    }
  }
  return ev.sort((a,b)=>a.m-b.m);
}

function simulatePenalties() {
  let p1=0, p2=0; let h1=[], h2=[];
  for(let i=0; i<5; i++){
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  while(p1 === p2) {
    let g1 = Math.random() < 0.75; h1.push(g1); if(g1) p1++;
    let g2 = Math.random() < 0.75; h2.push(g2); if(g2) p2++;
  }
  return {p1, p2, h1, h2};
}

function renderMatchCard(idx) {

    return;
  }

  document.getElementById("match-title-tag").textContent = `MAÇ ${idx+1} / ${SON32_MATCHES.length}`;
  document.getElementById("team1-flag").textContent = flag(m.t1);
  document.getElementById("team2-flag").textContent = flag(m.t2);
  document.getElementById("team1-name").textContent = m.t1;
  document.getElementById("team2-name").textContent = m.t2;
  
  document.getElementById("choice-win1").textContent = `🟢 ${m.t1} Kazanır`;
  document.getElementById("choice-win2").textContent = `🔴 ${m.t2} Kazanır`;

  // Zaman Kilidi (Time Lock Logic)
  const now = new Date().getTime();
  const matchTime = new Date(m.date).getTime();
  isCurrentMatchLocked = now >= matchTime;

  if (isCurrentMatchLocked) {
    // Maç başladıysa tahminleri gizle, durumu göster.
    document.querySelectorAll(".choice-btn").forEach(b => b.style.display = "none");
    const sb = document.getElementById("sim-box");
    sb.style.display = "block";
    
    document.getElementById("sim-t1").textContent = m.t1;
    document.getElementById("sim-t2").textContent = m.t2;
    document.getElementById("sim-events").innerHTML = `
      <div style="text-align:center; padding:16px; color:var(--red); font-weight:700;">
        MAÇ BAŞLADI/TAMAMLANDI<br><span style="font-size:0.8rem; color:var(--text-muted);">Tahmine Kapalı</span>
      </div>`;
    
    if (m.realScore) {
        document.getElementById("sim-score").textContent = `${m.realScore.s1} - ${m.realScore.s2}`;
    } else {
        document.getElementById("sim-score").textContent = `-`;
    }

    document.getElementById("next-match-btn").style.display = "block";
  } else {
    // Normal tahmin arayüzü
    document.getElementById("sim-box").style.display = "none";
    document.getElementById("next-match-btn").style.display = "none";
    document.querySelectorAll(".choice-btn").forEach(b => { 
        b.style.display = "block"; 
        b.classList.remove("selected"); 
        b.disabled = false; 
        b.style.opacity = "1"; 
    });
  }
  
  const pct = ((idx) / SON32_MATCHES.length * 100).toFixed(1);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("match-progress-txt").textContent = `Maç ${idx+1} / ${SON32_MATCHES.length}`;
}

async function handleChoice(outcome) {
  if (isCurrentMatchLocked) return;

  const m = SON32_MATCHES[currentMatchIdx];
  
  // Tıklama anında saati bir kez daha kontrol et
  const now = new Date().getTime();
  const matchTime = new Date(m.date).getTime();
  if (now >= matchTime) {
      toast("Bu maç çoktan başladı! Tahmin yapamazsınız.");
      renderMatchCard(currentMatchIdx);
      return;
  }

  document.querySelectorAll(".choice-btn").forEach(b => { b.disabled = true; b.style.opacity = ".4"; });
  
  const selClass = outcome === "win1" ? "win1" : (outcome === "draw" ? "draw" : "win2");
  document.querySelector(`.choice-btn.${selClass}`)?.classList.add("selected");
  
  const [s1, s2] = genKOScore(m.t1, m.t2, outcome);
  const evs = genEvents(m.t1, m.t2, s1, s2, 120);
  
  let pens = null;
  let winner = s1 > s2 ? m.t1 : (s2 > s1 ? m.t2 : null);
  if(outcome === "draw" || s1 === s2) {
    pens = simulatePenalties();
    winner = pens.p1 > pens.p2 ? m.t1 : m.t2;
  }
  
  const sb = document.getElementById("sim-box");
  const ec = document.getElementById("sim-events");
  const sc = document.getElementById("sim-score");
  sb.style.display = "block"; ec.innerHTML = "";
  document.getElementById("sim-t1").textContent = m.t1;
  document.getElementById("sim-t2").textContent = m.t2;
  
  let c1=0, c2=0; sc.textContent = "0 - 0";
  const delay = 150;
  
  for(const ev of evs){
    await new Promise(r => setTimeout(r, delay));
    const div = document.createElement("div"); div.className = "sim-event";
    if(ev.type === "goal"){
      if(ev.team === 1) c1++; else c2++; sc.textContent = `${c1} - ${c2}`;
      div.innerHTML = `<span class="ev-min">${ev.m}'</span><span>⚽</span><span>${flag(ev.teamName)} <strong>${ev.sc}</strong></span>`;
    } else {
      div.innerHTML = `<span class="ev-min">${ev.m}'</span><span>${ev.type==="red"?"🟥":"🟨"}</span><span>${flag(ev.teamName)} ${ev.pl}</span>`;
    }
    ec.appendChild(div); ec.scrollTop = ec.scrollHeight;
  }
  sc.textContent = `${s1} - ${s2}`;
  
  if(pens) {
    const pr = document.createElement("div"); pr.className = "pen-row";
    pr.innerHTML = `<div class="pen-dots left">${pens.h1.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div><div class="pen-score-mid">${pens.p1} - ${pens.p2}</div><div class="pen-dots right">${pens.h2.map(x=>x?'<div class="pen-dot goal"></div>':'<div class="pen-dot miss"></div>').join("")}</div>`;
    ec.appendChild(pr);
  }
  
  simulationResults[m.id] = { s1, s2, winner, pens, isUserPrediction: true };
  
  evs.forEach(e => {
    if(e.type === "goal") {
      if(!playerStats[e.sc]) playerStats[e.sc] = { goals: 0, assists: 0, teamName: e.teamName };
      playerStats[e.sc].goals++;
      if(e.as) {
        if(!playerStats[e.as]) playerStats[e.as] = { goals: 0, assists: 0, teamName: e.teamName };
        playerStats[e.as].assists++;
      }
    }
  });
  
  renderStats();
  document.getElementById("next-match-btn").style.display = "block";
  
  set(ref(db, `${FBP()}/simulationResults`), simulationResults);
  set(ref(db, `${FBP()}/playerStats`), playerStats);
  set(ref(db, `${FBP()}/progress`), currentMatchIdx + 1);
}

document.getElementById("next-match-btn").addEventListener("click", ()=>{
  // Maç geçildiyse "skipped" olarak veritabanına kaydet
  if (isCurrentMatchLocked) {
      const m = SON32_MATCHES[currentMatchIdx];
      simulationResults[m.id] = { 
          skipped: true, 
          isUserPrediction: false,
          realScore: m.realScore || null 
      };
      set(ref(db, `${FBP()}/simulationResults`), simulationResults);
      set(ref(db, `${FBP()}/progress`), currentMatchIdx + 1);
  }

  currentMatchIdx++;
  if(currentMatchIdx >= SON32_MATCHES.length) {
    set(ref(db, `${FBP()}/done`), true);
    switchTab("results");
  } else {
    renderMatchCard(currentMatchIdx);
  }
});

function renderStats() {
  const arr = Object.keys(playerStats).map(p => ({name: p, ...playerStats[p]}));
  
  const topScorers = [...arr].sort((a,b) => b.goals - a.goals || b.assists - a.assists).slice(0, 10);
  const topAssists = [...arr].sort((a,b) => b.assists - a.assists || b.goals - a.goals).slice(0, 10);
  
  document.getElementById("top-scorers-list").innerHTML = topScorers.map(p => `<div class="stat-item"><div class="stat-player"><span>${flag(p.teamName)}</span> <span>${p.name}</span></div><div class="stat-val">${p.goals}</div></div>`).join("");
  document.getElementById("top-assists-list").innerHTML = topAssists.map(p => `<div class="stat-item"><div class="stat-player"><span>${flag(p.teamName)}</span> <span>${p.name}</span></div><div class="stat-val">${p.assists}</div></div>`).join("");
}

      <div class="result-user">${curUser} tarafından tamamlanan tahminler</div>
      <div class="done-message">
        ${currentMatchIdx >= SON32_MATCHES.length ? "🎉 Tebrikler! Tüm 16 eleme maçının aşamasını tamamladın." : "Turnuva henüz tamamlanmadı. Maçları sırayla incelemeye devam edin!"}
      </div>
    </div>`;
}

document.getElementById("restart-btn").addEventListener("click", async()=>{
  if(!confirm("Simülasyonu sıfırlamak istediğine emin misin?")) return;
  await remove(ref(db, FBP()));
  location.reload();
});

async function loadAndInit() {
  try {
    const snap = await get(ref(db, FBP()));
    const data = snap.val();
    if(data) {
      simulationResults = data.simulationResults || {};
      playerStats = data.playerStats || JSON.parse(JSON.stringify(INITIAL_TOURNAMENT_STATS));
      currentMatchIdx = data.progress || 0;
    } else {
      playerStats = JSON.parse(JSON.stringify(INITIAL_TOURNAMENT_STATS));
      currentMatchIdx = 0;
    }
    renderStats();
    renderMatchCard(currentMatchIdx);
  } catch(e) {
    console.error(e);
  }
}
</script>
